<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag-and-Drop: Bedeutungspaare</title>
    <style>
        :root {
            --primary: #0056b3;
            --success: #28a745;
            --error: #dc3545;
            --bg: #f4f7f6;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .quiz-container {
            background: white;
            max-width: 600px;
            width: 100%;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: #333; font-size: 1.2rem; }

        .game-area {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 20px;
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .item {
            background: #fff;
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Status-Farben */
        .selected { border-color: var(--primary); background: #e7f1ff; }
        .matched { visibility: hidden; opacity: 0; }
        
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            min-height: 20px;
        }

        .restart-btn {
            display: none;
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }

        @media (max-width: 480px) {
            .game-area { flex-direction: column; }
            .item { padding: 12px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>Verbinde die russischen Ausdrücke mit der passenden Bedeutung!</h2>
    
    <div class="game-area">
        <div class="column" id="russian-col">
            <!-- Russisch -->
            <div class="item" data-pair="1" onclick="selectItem(this, 'ru')">Ага</div>
            <div class="item" data-pair="2" onclick="selectItem(this, 'ru')">сейчас</div>
            <div class="item" data-pair="3" onclick="selectItem(this, 'ru')">Ага сейчас</div>
        </div>
        
        <div class="column" id="german-col">
            <!-- Deutsch (gemischt) -->
            <div class="item" data-pair="2" onclick="selectItem(this, 'de')">jetzt / sofort</div>
            <div class="item" data-pair="3" onclick="selectItem(this, 'de')">Von wegen! / Träum weiter!</div>
            <div class="item" data-pair="1" onclick="selectItem(this, 'de')">Ja / Aha (umgangssprachlich)</div>
        </div>
    </div>

    <div id="feedback" class="feedback"></div>
    <button id="restart-btn" class="restart-btn" onclick="resetGame()">Neustart</button>
</div>

<script>
    let selectedRu = null;
    let selectedDe = null;
    let matches = 0;

    function selectItem(element, lang) {
        // Falls bereits gematcht, ignorieren
        if (element.classList.contains('matched')) return;

        // Markierung in der aktuellen Spalte setzen
        if (lang === 'ru') {
            if (selectedRu) selectedRu.classList.remove('selected');
            selectedRu = element;
        } else {
            if (selectedDe) selectedDe.classList.remove('selected');
            selectedDe = element;
        }
        element.classList.add('selected');

        checkMatch();
    }

    function checkMatch() {
        if (selectedRu && selectedDe) {
            const feedback = document.getElementById('feedback');
            
            if (selectedRu.dataset.pair === selectedDe.dataset.pair) {
                // Erfolg
                selectedRu.classList.add('matched');
                selectedDe.classList.add('matched');
                matches++;
                feedback.innerHTML = "Richtig verbunden!";
                feedback.style.color = "var(--success)";
            } else {
                // Fehler
                feedback.innerHTML = "Das passt nicht zusammen. Versuch es noch einmal!";
                feedback.style.color = "var(--error)";
            }

            // Auswahl aufheben
            selectedRu.classList.remove('selected');
            selectedDe.classList.remove('selected');
            selectedRu = null;
            selectedDe = null;

            if (matches === 3) {
                feedback.innerHTML = "🎉 Super! Alle Paare wurden korrekt zugeordnet.";
                document.getElementById('restart-btn').style.display = "block";
            }
        }
    }

    function resetGame() {
        matches = 0;
        document.getElementById('restart-btn').style.display = "none";
        document.getElementById('feedback').innerHTML = "";
        
        const items = document.querySelectorAll('.item');
        items.forEach(item => {
            item.classList.remove('matched', 'selected');
        });

        // Optional: Hier könnte man die Spalten neu mischen
    }
</script>

</body>
</html>
