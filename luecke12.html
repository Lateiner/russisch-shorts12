<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialog-Quiz: Russischer Sarkasmus</title>
    <style>
        :root {
            --primary: #0056b3;
            --success: #28a745;
            --error: #dc3545;
            --bg: #f0f4f8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-card {
            background: white;
            max-width: 600px;
            width: 100%;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .progress-container {
            margin-bottom: 20px;
        }

        .progress-text {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
            display: block;
            text-align: right;
        }

        .progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 20%;
            transition: width 0.3s ease;
        }

        .dialog-box {
            background: #f9f9f9;
            border-left: 5px solid var(--primary);
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            min-height: 150px;
        }

        .speaker { font-weight: bold; color: #444; }

        .gap-select {
            padding: 8px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin: 5px 0;
            cursor: pointer;
            width: 100%;
            max-width: 250px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .check-btn { background: var(--primary); color: white; }
        .next-btn { background: #333; color: white; display: none; }
        .reset-btn { background: #6c757d; color: white; }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        @media (max-width: 480px) {
            .btn-group { flex-direction: column; }
            .gap-select { max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="quiz-card" id="quiz-container">
    <div class="progress-container">
        <span class="progress-text" id="progress-text">Dialog 1 von 5</span>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <h3 id="scenario-title">Szenario: Eine unverschämte Bitte</h3>
    
    <div class="dialog-box" id="dialog-content">
        <!-- Dynamischer Inhalt -->
    </div>

    <div class="btn-group">
        <button class="btn check-btn" id="check-btn" onclick="checkAnswer()">Prüfen</button>
        <button class="btn next-btn" id="next-btn" onclick="loadNext()">Nächster Dialog</button>
        <button class="btn reset-btn" onclick="resetQuiz()">Neustart</button>
    </div>

    <div id="feedback" class="feedback"></div>
</div>

<script>
    const dialogs = [
        {
            title: "Szenario: Eine unverschämte Bitte",
            text1: "Maxim: „Kannst du mich 200 km zum Flughafen fahren?“",
            text2: "Elena: „",
            text3: "! Ich habe morgen früh eine Prüfung und kein Benzin!“",
            correct: "irony",
            explanation: "Richtig! Elena ist genervt von der unrealistischen Bitte."
        },
        {
            title: "Szenario: Hausarbeit unter Geschwistern",
            text1: "Bruder: „Räumst du heute mein Zimmer für mich auf?“",
            text2: "Schwester: „",
            text3: ". Such dir einen anderen Dummen, ich gehe jetzt raus.“",
            correct: "irony",
            explanation: "Genau! Hier drückt 'Ага сейчас' die klare, leicht spöttische Absage aus."
        },
        {
            title: "Szenario: Im Büro (höflich bleiben)",
            text1: "Chef: „Könnten Sie diesen Bericht bis morgen fertigstellen?“",
            text2: "Angestellte: „",
            text3: ", ich setze mich sofort an die Arbeit.“",
            correct: "da",
            explanation: "Richtig! Im Büro gegenüber dem Chef nutzt man das formellere 'Да', keinen Sarkasmus."
        },
        {
            title: "Szenario: Eine einfache Bestätigung",
            text1: "Mutter: „Kommst du heute Abend zum Essen?“",
            text2: "Sohn: „",
            text3: ", ich bin gegen 19 Uhr da.“",
            correct: "aga",
            explanation: "Richtig! 'Ага' allein (ohne 'сейчас') ist ein lockeres 'Ja' unter Freunden oder Familie."
        },
        {
            title: "Szenario: Ein schlechter Witz",
            text1: "Freund: „Gibst du mir dein neues Handy geschenkt?“",
            text2: "Du: „",
            text3: "! Ich habe dafür zwei Jahre gespart!“",
            correct: "irony",
            explanation: "Exzellent! 'Аga seychas' ist die perfekte Reaktion auf absurde Vorschläge."
        }
    ];

    let currentStep = 0;

    function loadDialog() {
        const d = dialogs[currentStep];
        document.getElementById('scenario-title').innerText = d.title;
        document.getElementById('progress-text').innerText = `Dialog ${currentStep + 1} von ${dialogs.length}`;
        document.getElementById('progress-fill').style.width = ((currentStep + 1) / dialogs.length * 100) + "%";
        
        document.getElementById('dialog-content').innerHTML = `
            <p><span class="speaker">A:</span> ${d.text1}</p>
            <p><span class="speaker">B:</span> ${d.text2}
                <select id="gap" class="gap-select">
                    <option value="">-- wählen --</option>
                    <option value="da">Да (Ja)</option>
                    <option value="aga">Ага (Ja/Aha)</option>
                    <option value="irony">Ага сейчас (Sarkastisches Ja/Von wegen)</option>
                </select>
                ${d.text3}
            </p>
        `;
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('check-btn').style.display = 'block';
    }

    function checkAnswer() {
        const val = document.getElementById('gap').value;
        const feedback = document.getElementById('feedback');
        const d = dialogs[currentStep];

        if(!val) return;

        feedback.style.display = 'block';
        if(val === d.correct) {
            feedback.style.backgroundColor = "#d4edda";
            feedback.style.color = "#155724";
            feedback.innerHTML = "<strong>" + d.explanation + "</strong>";
            document.getElementById('check-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
        } else {
            feedback.style.backgroundColor = "#f8d7da";
            feedback.style.color = "#721c24";
            feedback.innerHTML = "Das passt hier nicht ganz. Überlege, wie die Person sich in dieser Situation fühlt.";
        }
    }

    function loadNext() {
        currentStep++;
        if(currentStep < dialogs.length) {
            loadDialog();
        } else {
            document.getElementById('quiz-container').innerHTML = `
                <div style="text-align:center; padding: 20px;">
                    <h2>Super gemacht! 🎉</h2>
                    <p>Du beherrschst nun die verschiedenen Nuancen von "Да", "Ага" und dem sarkastischen "Ага сейчас".</p>
                    <button class="btn check-btn" onclick="location.reload()">Alles von vorn</button>
                </div>
            `;
        }
    }

    function resetQuiz() {
        currentStep = 0;
        loadDialog();
    }

    // Start
    loadDialog();
</script>

</body>
</html>
