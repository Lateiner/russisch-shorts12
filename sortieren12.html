<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sortieraufgabe: Höflichkeit</title>
    <style>
        :root {
            --formell: #1a3a5f;
            --neutral: #4a90e2;
            --sarkastisch: #e67e22;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; font-size: 1.2rem; color: #333; margin-top: 0; }
        
        .instruction {
            font-size: 0.9rem;
            color: #666;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .labels {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .sort-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sort-item {
            padding: 15px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            user-select: none;
        }

        .sort-item:active { transform: scale(0.98); }
        .sort-item .handle { font-size: 1.2rem; color: #ccc; }

        /* Status Farben */
        .correct { border-color: #28a745 !important; background-color: #e9f7ef !important; }
        .wrong { border-color: #dc3545 !important; background-color: #fdf2f2 !important; }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        .check-btn { background: var(--formell); color: white; }
        .reset-btn { background: #6c757d; color: white; }
        .btn:hover { opacity: 0.9; }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .container { padding: 15px; }
            .sort-item { padding: 12px; font-size: 0.9rem; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Höflichkeitsstufen</h2>
    <p class="instruction">Bringe die Antworten in die richtige Reihenfolge:<br><strong>Oben: Sehr formell ➔ Unten: Sarkastisch</strong></p>
    
    <div class="labels">
        <span>Höflich ↑</span>
        <span>Sarkastisch ↓</span>
    </div>

    <div class="sort-list" id="sortable-list">
        <!-- Items werden initial per JavaScript gemischt geladen -->
    </div>

    <div class="btn-group">
        <button class="btn check-btn" onclick="checkOrder()">Prüfen</button>
        <button class="btn reset-btn" onclick="initQuiz()">Neustart</button>
    </div>

    <div id="feedback" class="feedback"></div>
</div>

<script>
    const data = [
        { id: 1, text: "Я обязательно это сделаю", translation: "Ich werde das unbedingt tun" },
        { id: 2, text: "Да, конечно", translation: "Ja, natürlich" },
        { id: 3, text: "Хорошо", translation: "Gut / Okay" },
        { id: 4, text: "Ага сейчас", translation: "Von wegen / Ja, gleich..." }
    ];

    function initQuiz() {
        const list = document.getElementById('sortable-list');
        const feedback = document.getElementById('feedback');
        feedback.style.display = 'none';
        list.innerHTML = '';

        // Mische die Daten zufällig
        const shuffled = [...data].sort(() => Math.random() - 0.5);

        shuffled.forEach(item => {
            const div = document.createElement('div');
            div.className = 'sort-item';
            div.setAttribute('data-id', item.id);
            div.onclick = () => move(div);
            div.innerHTML = `
                <span><strong>${item.text}</strong> <br><small style="color:#666">${item.translation}</small></span>
                <span class="handle">↕</span>
            `;
            list.appendChild(div);
        });
    }

    function move(el) {
        const list = document.getElementById('sortable-list');
        const items = Array.from(list.children);
        const index = items.indexOf(el);
        
        // Element eins nach oben schieben, wenn ganz oben -> nach ganz unten
        if (index > 0) {
            list.insertBefore(el, items[index - 1]);
        } else {
            list.appendChild(el);
        }
        
        // Farben zurücksetzen bei Interaktion
        items.forEach(item => item.classList.remove('correct', 'wrong'));
        document.getElementById('feedback').style.display = 'none';
    }

    function checkOrder() {
        const items = document.querySelectorAll('.sort-item');
        const feedback = document.getElementById('feedback');
        let isCorrect = true;

        items.forEach((item, index) => {
            const id = parseInt(item.getAttribute('data-id'));
            // Die richtige ID muss dem Index + 1 entsprechen
            if (id === index + 1) {
                item.classList.add('correct');
                item.classList.remove('wrong');
            } else {
                item.classList.add('wrong');
                item.classList.remove('correct');
                isCorrect = false;
            }
        });

        feedback.style.display = 'block';
        if (isCorrect) {
            feedback.style.backgroundColor = '#d4edda';
            feedback.style.color = '#155724';
            feedback.innerHTML = "<strong>Perfekt!</strong> Du hast die Nuancen erkannt. Je kürzer und lockerer der Ausdruck, desto informeller (oder sarkastischer) ist er.";
        } else {
            feedback.style.backgroundColor = '#f8d7da';
            feedback.style.color = '#721c24';
            feedback.innerHTML = "<strong>Noch nicht ganz.</strong> Die langen, höflichen Sätze gehören nach oben, <em>Ага сейчас</em> als sarkastische Ablehnung nach ganz unten.";
        }
    }

    // Erster Start
    initQuiz();
</script>

</body>
</html>
