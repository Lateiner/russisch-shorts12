<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Quiz</title>
    <style>
        :root {
            --primary: #0056b3;
            --success: #28a745;
            --error: #dc3545;
            --bg: #f4f7f6;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .quiz-card {
            background: white;
            max-width: 450px;
            width: 100%;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .russian-text {
            font-size: 2.5rem;
            color: var(--primary);
            margin: 20px 0;
            font-weight: bold;
        }

        .instruction {
            color: #555;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .option-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Die Auswahl-Karten */
        .option-card {
            border: 2px solid #ddd;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fff;
        }

        .option-card:hover {
            border-color: var(--primary);
            background: #f0f7ff;
        }

        .play-button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
            width: 100%;
        }

        /* Status-Klassen */
        .hidden { display: none !important; }
        
        .correct-answer { border-color: var(--success) !important; background-color: #e9f7ef !important; border-width: 3px; }
        .wrong-answer { border-color: var(--error) !important; background-color: #fdf2f2 !important; border-width: 3px; }
        .disabled { pointer-events: none; }

        /* Feedback-Bereich */
        #feedback-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            line-height: 1.4;
        }

        .feedback-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .feedback-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .restart-button {
            margin-top: 20px;
            background: #333;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="instruction">Höre dir beide Proben an. Welche klingt nach einer <b>sarkastischen Ablehnung</b>?</div>
    
    <div class="russian-text">Ага сейчас</div>

    <div class="option-container">
        <!-- Karte A -->
        <div id="card-A" class="option-card" onclick="selectCard('A')">
            <button class="play-button" onclick="playSound('neutral', event)">▶ Probe A hören</button>
            <div>Wählen</div>
        </div>

        <!-- Karte B -->
        <div id="card-B" class="option-card" onclick="selectCard('B')">
            <button class="play-button" onclick="playSound('sarcastic', event)">▶ Probe B hören</button>
            <div>Wählen</div>
        </div>
    </div>

    <!-- FEEDBACK FELD (wird eingeblendet) -->
    <div id="feedback-box" class="hidden"></div>

    <!-- NEUSTART BUTTON (wird eingeblendet) -->
    <button id="restart-btn" class="restart-button hidden" onclick="restartQuiz()">Neustart</button>
</div>

<script>
    const synth = window.speechSynthesis;

    // Funktion für die Sprachausgabe
    function playSound(type, event) {
        event.stopPropagation(); // Verhindert Auswahl beim Klicken auf Abspielen
        synth.cancel(); // Vorherige Sprache stoppen

        const msg = new SpeechSynthesisUtterance("Ага сейчас");
        msg.lang = 'ru-RU';

        if (type === 'sarcastic') {
            msg.pitch = 1.6; // Höherer, spöttischer Ton
            msg.rate = 0.6;  // Viel langsamer/gedehnt
        } else {
            msg.pitch = 1.0; // Normaler Ton
            msg.rate = 1.0;  // Normales Tempo
        }
        
        synth.speak(msg);
    }

    // Funktion für die Auswahl
    function selectCard(choice) {
        const feedback = document.getElementById('feedback-box');
        const restartBtn = document.getElementById('restart-btn');
        const cardA = document.getElementById('card-A');
        const cardB = document.getElementById('card-B');

        // Buttons deaktivieren
        cardA.classList.add('disabled');
        cardB.classList.add('disabled');

        // Feedback und Neustart einblenden
        feedback.classList.remove('hidden');
        restartBtn.classList.remove('hidden');

        if (choice === 'B') {
            cardB.classList.add('correct-answer');
            feedback.innerHTML = "Richtig! Das ist die sarkastische Form. Die gedehnte Aussprache bedeutet: „Vergiss es!“";
            feedback.className = "feedback-success";
        } else {
            cardA.classList.add('wrong-answer');
            cardB.classList.add('correct-answer');
            feedback.innerHTML = "Leider falsch. Probe A war neutral. Die sarkastische Ablehnung ist Probe B (lang und betont).";
            feedback.className = "feedback-error";
        }
    }

    // Neustart Funktion
    function restartQuiz() {
        // Alles zurücksetzen
        document.getElementById('feedback-box').classList.add('hidden');
        document.getElementById('restart-btn').classList.add('hidden');
        
        const cardA = document.getElementById('card-A');
        const cardB = document.getElementById('card-B');
        
        cardA.classList.remove('disabled', 'wrong-answer', 'correct-answer');
        cardB.classList.remove('disabled', 'wrong-answer', 'correct-answer');
        
        synth.cancel();
    }
</script>

</body>
</html>
